<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="contact-page.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
</head>
<body>
    <h2 id="title">Contact Page</h2>
    <p>Questions? Curious? Heres how you can reach me!</p>
    <div id="Inputs">
        <form id="form">

        <label for="first">First Name(*)</label><input type="text" id="first" placeholder="Enter first name" required autofocus> 

        <label for="last">Last Name(*)</label><input type="text" id="last" placeholder="Enter last name" required>
            
        
        <label class="label" for="email">Email(*)</label>
        <input type="email" id="email" placeholder="email address" required> 
        
        <label class="label" for="telly">Cell-phone</label>
        <input type="tel" id="telly" placeholder="xxx-xxx-xxxx"> 

         <div>
            <label class="label" for="subject">Select most related subject of message:</label>
            <input type="checkbox" id="sub1" value="general" required>
            <input type="checkbox" id="sub2" name="sub2" value="Car">
  <label    for="sub2"> I have a car</label><br>
  <input    <input type="checkbox" id="sub3" name="sub3" value="Boat">
  <label    for="sub3"> I have a boat</label>
        </div>
           
       
          <input type="text" class="message-box" placeholder="Brief message">  
        
        
            
        <input type="submit" id="Submit" value="Submit" class="submit" onclick="Submit()">

        <input type="submit" id="Return" value="Return to Home" class="submit" onclick="ReturnHome">

    </form>
    </div>
    
    <footer id="footer">Please Note: Fields Marked with '*' are required before submitting</footer>

    <a id="return-home" href="index.html"> 
      <h2 id="return-home">Return to Home Page</h2>
    </a>
